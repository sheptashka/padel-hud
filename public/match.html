<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Матч — статистика</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="match">
  <div class="mWrap">

    <header class="mHeader">
      <div class="mTeam mTeamLeft" id="mTeamA">Команда 1</div>

      <div class="mCenter">
        <div class="mTotal" id="mTotal">0 : 0</div>
        <div class="mStatus" id="mStatus">Загружаем…</div>
      </div>

      <div class="mTeam mTeamRight" id="mTeamB">Команда 2</div>
    </header>

    <main class="mGrid">
      <section class="mCard">
        <div class="mCardTitle" id="mRosterATitle">Состав</div>
        <ul class="mRoster" id="mRosterA"></ul>
      </section>

      <section class="mCard mCardCenter">
        <div class="mCardTitle">Результаты матчей</div>
        <div class="mScores" id="mScores"></div>
      </section>

      <section class="mCard">
        <div class="mCardTitle" id="mRosterBTitle">Состав</div>
        <ul class="mRoster" id="mRosterB"></ul>
      </section>
    </main>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/match.js"></script>
</body>
</html>
