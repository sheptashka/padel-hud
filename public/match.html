<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Match Stats</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body class="match">
  <div class="mWrap">
    <header class="mHeader">
      <div class="mTeam mTeamLeft" id="teamAName">Команда A</div>

      <div class="mScore" aria-label="Общий счёт за турнир">
        <span class="mScoreNum" id="totalA">0</span>
        <span class="mScoreSep">:</span>
        <span class="mScoreNum" id="totalB">0</span>
      </div>

      <div class="mTeam mTeamRight" id="teamBName">Команда B</div>
    </header>

    <main class="mGrid">
      <section class="mCol">
        <div class="mColTitle">Состав команды:</div>
        <ul class="mRoster" id="rosterA"></ul>
      </section>

      <section class="mCol mColCenter">
        <div class="mColTitle mCenterTitle">Счёт матчей</div>
        <div class="mMatches" id="matchScores"></div>
      </section>

      <section class="mCol">
        <div class="mColTitle">Состав команды:</div>
        <ul class="mRoster" id="rosterB"></ul>
      </section>
    </main>

    <div class="mStatus" id="statusLine"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/match.js"></script>
</body>
</html>
